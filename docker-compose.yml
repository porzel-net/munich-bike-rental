services:
  app:
    image: ${APP_IMAGE:-bikerental:local}
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      APP_ORIGIN: ${APP_ORIGIN:-http://localhost:3000}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_SECURE: ${SMTP_SECURE:-true}
      MAIL_USE_SSL: ${MAIL_USE_SSL:-}
      MAIL_USE_STARTTLS: ${MAIL_USE_STARTTLS:-}
      MAIL_TIMEOUT_SECONDS: ${MAIL_TIMEOUT_SECONDS:-20}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-anfrage@munich-bike-rental.de}
      MAIL_TO_ADDRESS: ${MAIL_TO_ADDRESS:-hallo@munich-bike-rental.de}
    expose:
      - "3000"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - >-
          const http=require('http');const req=http.get('http://127.0.0.1:3000/api/health',res=>process.exit(res.statusCode===200?0:1));req.on('error',()=>process.exit(1));req.setTimeout(2000,()=>{req.destroy();process.exit(1);});
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

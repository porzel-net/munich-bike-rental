name: Build and publish Docker image

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/bikerental

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login "${{ env.REGISTRY }}" -u "${{ github.actor }}" --password-stdin

      - name: Build and push image
        env:
          SITE_URL: ${{ vars.SITE_URL || 'https://www.munich-bike-rental.de' }}
        run: |
          set -euo pipefail

          IMAGE="${REGISTRY}/${IMAGE_NAME}"
          SHORT_SHA="$(printf '%s' "${GITHUB_SHA}" | cut -c1-12)"
          TAGS=("${IMAGE}:sha-${SHORT_SHA}")

          if [ "${GITHUB_REF_TYPE}" = "branch" ]; then
            SAFE_BRANCH="$(printf '%s' "${GITHUB_REF_NAME}" | tr '[:upper:]/' '[:lower:]-')"
            TAGS+=("${IMAGE}:${SAFE_BRANCH}")
            if [ "${GITHUB_REF_NAME}" = "main" ]; then
              TAGS+=("${IMAGE}:latest")
            fi
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAGS+=("${IMAGE}:${GITHUB_REF_NAME}")
          fi

          BUILD_TAG_ARGS=()
          for tag in "${TAGS[@]}"; do
            BUILD_TAG_ARGS+=("-t" "$tag")
          done

          docker build \
            --build-arg SITE_URL="${SITE_URL}" \
            "${BUILD_TAG_ARGS[@]}" \
            .

          for tag in "${TAGS[@]}"; do
            docker push "${tag}"
          done
